name: campaign-worker

# Vercel Hobby allows only daily crons; the campaign batch worker needs
# more frequent ticks. GitHub Actions provides a free 5-minute schedule
# which is plenty for church-scale send volume. The endpoint itself is
# fail-closed without CRON_SECRET and bounded by `processCampaignBatch`
# (atomic claim via SECURITY DEFINER RPC), so re-firing while a previous
# run is in flight is safe.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger campaign worker
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${APP_BASE_URL}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "APP_BASE_URL or CRON_SECRET secrets not configured — skipping."
            exit 0
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_BASE_URL}/api/cron/send-campaign-batch"
