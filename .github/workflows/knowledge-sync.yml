name: knowledge-sync

# Pulls the latest content from ms.church into the AI church knowledge base once
# a day, so drafted replies stay current with the website without anyone
# clicking the Settings button. Admins can also sync on demand from Settings.
# The endpoint is fail-closed without CRON_SECRET and is idempotent (content
# hashes skip unchanged pages), so re-firing is safe.

on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger knowledge sync
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${APP_BASE_URL}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "APP_BASE_URL or CRON_SECRET secrets not configured — skipping."
            exit 0
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_BASE_URL}/api/cron/sync-knowledge"
