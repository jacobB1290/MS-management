name: heartbeat

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Read heartbeat row
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -fsS \
            -H "apikey: ${SUPABASE_PUBLISHABLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_PUBLISHABLE_KEY}" \
            "${SUPABASE_URL}/rest/v1/heartbeat?id=eq.1&select=*")
          echo "read response: ${response}"

      - name: Update heartbeat last_run_at
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -fsS -X PATCH \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            --data "{\"last_run_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            "${SUPABASE_URL}/rest/v1/heartbeat?id=eq.1")
          echo "patch response: ${response}"
